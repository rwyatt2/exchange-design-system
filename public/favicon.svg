<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="primary-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2b59a4" />
      <stop offset="100%" stop-color="#0dcde4" />
    </linearGradient>
    <linearGradient id="secondary-grad" x1="0%" y1="100%" x2="100%" y2="0%">
       <stop offset="0%" stop-color="#2d579d" />
       <stop offset="100%" stop-color="#09c7dd" />
    </linearGradient>
  </defs>
  
  <!-- Main unbroken ascending diagonal \/ this matches the uploaded logo's solid line -->
  <path d="M 0 100 L 25 100 L 100 0 L 75 0 Z" fill="url(#primary-grad)" />
  
  <!-- Top-left segment of the broken descending diagonal -->
  <path d="M 0 0 L 25 0 L 41 21 L 21 41 L 0 13 Z" fill="url(#secondary-grad)" />
  
  <!-- Bottom-right segment of the broken descending diagonal -->
  <path d="M 100 100 L 75 100 L 59 79 L 79 59 L 100 87 Z" fill="url(#secondary-grad)" />
  
  <rect width="100" height="100" fill="transparent" />
</svg>
