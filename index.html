<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Restore path encoded by 404.html for SPA routing on GitHub Pages
      (function(){
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s){ return s.replace(/~and~/g,'&') })
          history.replaceState(null, null, decoded[0] + (decoded[1] ? '?' + decoded[1] : '') + l.hash);
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Exchange Design System — A comprehensive design system for enterprise data exchange applications" />
    <title>Exchange Design System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
